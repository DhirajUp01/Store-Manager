{% extends "base.html" %}
{% block page_title %}Print Label — {{ product.sku }}{% endblock %}
{% block page_actions %}<a href="/barcodes/generate/{{ product.id }}" class="btn btn-gray">← Back</a>{% endblock %}
{% block content %}
<style>
@media print { .sidebar, .topbar, form, .btn { display: none !important; } body { background: white; } }
.label-sheet { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.5rem; }
.label { border: 1px dashed #999; padding: 0.75rem; text-align: center; width: 3in; height: 1.5in; font-size: 0.7rem; overflow: hidden; }
.label img { max-width: 100%; height: 60px; object-fit: contain; }
.label .sku { font-weight: 700; font-size: 0.8rem; margin-top: 0.2rem; }
.label .price { font-size: 0.75rem; color: #333; }
</style>
<form method="POST">
    <div class="card" style="max-width:600px;">
        <div class="form-grid">
            <div class="form-group">
                <label>Number of Labels</label>
                <input name="qty" type="number" value="1" min="1" max="100" class="form-control">
            </div>
            <div class="form-group">
                <label>Barcode Format</label>
                <select name="format" class="form-control">
                    {% for fmt in barcode_formats %}<option value="{{ fmt }}">{{ fmt }}</option>{% endfor %}
                </select>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Generate Labels →</button>
    </div>
</form>
{% endblock %}
