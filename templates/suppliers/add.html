{% extends "base.html" %}
{% block page_title %}Add Supplier{% endblock %}
{% block page_actions %}<a href="/suppliers" class="btn btn-gray">← Back</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group"><label>Company Name *</label><input name="name" class="form-control" required></div>
            <div class="form-group"><label>Supplier Code</label><input name="code" class="form-control" placeholder="Optional"></div>
            <div class="form-group"><label>Contact Person</label><input name="contact_name" class="form-control"></div>
            <div class="form-group"><label>Phone</label><input name="phone" class="form-control"></div>
            <div class="form-group"><label>Email</label><input name="email" type="email" class="form-control"></div>
            <div class="form-group"><label>GSTIN</label><input name="gstin" class="form-control" placeholder="e.g. 27AABCU9603R1ZM"></div>
            <div class="form-group"><label>Tax No</label><input name="tax_no" class="form-control"></div>
            <div class="form-group"><label>Payment Terms</label><input name="payment_terms" class="form-control" placeholder="e.g. Net 30"></div>
        </div>
        <div class="form-group"><label>Address</label><textarea name="address" class="form-control" rows="2"></textarea></div>
        <div class="form-group"><label>Notes</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
        <button type="submit" class="btn btn-primary">Add Supplier</button>
    </form>
</div>
{% endblock %}
