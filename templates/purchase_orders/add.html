{% extends "base.html" %}
{% block page_title %}New Purchase Order{% endblock %}
{% block page_actions %}{% endblock %}
{% block content %}
<div class="card" style="max-width:700px;">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>Supplier *</label>
                <select name="supplier_id" class="form-control" required>
                    <option value="">— Select Supplier —</option>
                    {% for s in suppliers %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Warehouse *</label>
                <select name="warehouse_id" class="form-control" required>
                    {% for w in warehouses %}<option value="{{ w.id }}">{{ w.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Expected Date</label>
                <input name="expected_date" type="date" class="form-control">
            </div>
        </div>
        <div class="form-group"><label>Notes</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
        <button type="submit" class="btn btn-primary">Create PO →</button>
    </form>
</div>
{% endblock %}
