{% extends "base.html" %}
{% block page_title %}Add Product{% endblock %}
{% block breadcrumb %}Products / Add{% endblock %}
{% block page_actions %}<a href="/products" class="btn btn-gray">← Back</a>{% endblock %}
{% block content %}
<div class="card">
    <form method="POST" enctype="multipart/form-data">
        <div class="form-grid">
            <div class="form-group">
                <label>SKU *</label>
                <input name="sku" class="form-control" placeholder="e.g. TPF-DOG-0001" required>
            </div>
            <div class="form-group">
                <label>Product Name *</label>
                <input name="name" class="form-control" placeholder="Premium Dog Collar" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="category_id" class="form-control">
                    <option value="">— Select —</option>
                    {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Unit of Measure</label>
                <select name="unit_id" class="form-control">
                    <option value="">— Select —</option>
                    {% for u in units %}<option value="{{ u.id }}">{{ u.name }} ({{ u.code }})</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>HSN Code</label>
                <input name="hsn_code" class="form-control" placeholder="e.g. 6209">
            </div>
            <div class="form-group">
                <label>Barcode Format</label>
                <select name="barcode_format" class="form-control">
                    {% for fmt in barcode_formats %}<option value="{{ fmt }}">{{ fmt }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Cost Price ({{ currency }})</label>
                <input name="cost_price" type="number" step="0.01" class="form-control" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Selling Price ({{ currency }})</label>
                <input name="selling_price" type="number" step="0.01" class="form-control" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>MRP ({{ currency }})</label>
                <input name="mrp" type="number" step="0.01" class="form-control" placeholder="0.00">
            </div>
            <div class="form-group">
                <label>Tax Rate (%)</label>
                <input name="tax_rate" type="number" step="0.01" value="0" class="form-control">
            </div>
            <div class="form-group">
                <label>Initial Stock</label>
                <input name="initial_stock" type="number" value="0" min="0" class="form-control">
            </div>
            <div class="form-group">
                <label>Initial Stock Warehouse</label>
                <select name="warehouse_id" class="form-control">
                    {% for w in warehouses %}<option value="{{ w.id }}">{{ w.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Reorder Point</label>
                <input name="reorder_point" type="number" value="5" min="0" class="form-control">
            </div>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="3" placeholder="Product description..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Create Product →</button>
    </form>
</div>
{% endblock %}
