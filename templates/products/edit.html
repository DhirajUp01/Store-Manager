{% extends "base.html" %}
{% block page_title %}Edit {{ product.sku }}{% endblock %}
{% block breadcrumb %}Products / {{ product.sku }} / Edit{% endblock %}
{% block page_actions %}<a href="/products/{{ product.id }}" class="btn btn-gray">← Back</a>{% endblock %}
{% block content %}
<div class="card">
    <form method="POST">
        <div class="form-grid">
            <div class="form-group">
                <label>SKU</label>
                <input class="form-control" value="{{ product.sku }}" disabled style="background:#f1f5f9;">
            </div>
            <div class="form-group">
                <label>Product Name *</label>
                <input name="name" class="form-control" value="{{ product.name }}" required>
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="category_id" class="form-control">
                    <option value="">— None —</option>
                    {% for c in categories %}<option value="{{ c.id }}" {% if product.category_id|int == c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Unit of Measure</label>
                <select name="unit_id" class="form-control">
                    <option value="">— None —</option>
                    {% for u in units %}<option value="{{ u.id }}" {% if product.unit_id|int == u.id %}selected{% endif %}>{{ u.name }} ({{ u.code }})</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>HSN Code</label>
                <input name="hsn_code" class="form-control" value="{{ product.hsn_code or '' }}">
            </div>
            <div class="form-group">
                <label>Barcode Format</label>
                <select name="barcode_format" class="form-control">
                    {% for fmt in barcode_formats %}<option value="{{ fmt }}" {% if product.barcode_format == fmt %}selected{% endif %}>{{ fmt }}</option>{% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Cost Price ({{ currency }})</label>
                <input name="cost_price" type="number" step="0.01" class="form-control" value="{{ product.cost_price }}">
            </div>
            <div class="form-group">
                <label>Selling Price ({{ currency }})</label>
                <input name="selling_price" type="number" step="0.01" class="form-control" value="{{ product.selling_price }}">
            </div>
            <div class="form-group">
                <label>MRP ({{ currency }})</label>
                <input name="mrp" type="number" step="0.01" class="form-control" value="{{ product.mrp }}">
            </div>
            <div class="form-group">
                <label>Tax Rate (%)</label>
                <input name="tax_rate" type="number" step="0.01" class="form-control" value="{{ product.tax_rate }}">
            </div>
            <div class="form-group">
                <label>Reorder Point</label>
                <input name="reorder_point" type="number" class="form-control" value="{{ product.reorder_point }}">
            </div>
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="3">{{ product.description or '' }}</textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save Changes</button>
    </form>
</div>
{% endblock %}
