{% extends "base.html" %}
{% block page_title %}Add Warehouse{% endblock %}
{% block page_actions %}<a href="/warehouses" class="btn btn-gray">← Back</a>{% endblock %}
{% block content %}
<div class="card" style="max-width:600px;">
    <form method="POST">
        <div class="form-group"><label>Warehouse Name *</label><input name="name" class="form-control" required></div>
        <div class="form-group"><label>Code *</label><input name="code" class="form-control" placeholder="e.g. WH-01" required></div>
        <div class="form-group"><label>Address</label><textarea name="address" class="form-control" rows="2"></textarea></div>
        <div class="form-group"><label>Contact Person</label><input name="contact_person" class="form-control"></div>
        <div class="form-group"><label>Phone</label><input name="phone" class="form-control"></div>
        <div class="form-group"><label>Email</label><input name="email" type="email" class="form-control"></div>
        <button type="submit" class="btn btn-primary">Create Warehouse</button>
    </form>
</div>
{% endblock %}
