version: "3.9"

services:
  app:
    build: .
    ports:
      - "${PORT:-5050}:${PORT:-5050}"
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
      - SECRET_KEY=docker-dev-secret-change-in-prod
      - DATABASE=tpims.db
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3
      - PORT=5050
    volumes:
      - ./tpims.db:/app/tpims.db
      - ./static/barcodes:/app/static/barcodes
      - ./exports:/app/exports
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
